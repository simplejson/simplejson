name: Build and upload to PyPI

on: [push, pull_request, merge_group]
# Alternatively, to publish when a (published) GitHub Release is created, use the following:
# on:
#   push:
#   pull_request:
#   release:
#     types:
#       - published

jobs:
  test_pure_python:
    name: Tests without speedup on ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - 'ubuntu-latest'
        python:
          - 3.14
          - 3.13
          - pypy-3.11
          - graalpy-25.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - run: python -m simplejson.tests._cibw_runner .

  test_free_threading:
    name: Tests with free-threading on Python 3.14t
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.14t'
      - name: Build extension with free-threading support
        run: |
          python -m pip install --upgrade pip setuptools wheel
          REQUIRE_SPEEDUPS=1 python setup.py build_ext -i
      - name: Verify GIL-free import (no RuntimeWarning)
        run: PYTHON_GIL=0 python -W error::RuntimeWarning -c "import simplejson._speedups"
      - name: Run tests
        run: python -m simplejson.tests._cibw_runner .
      - name: Run tests with GIL disabled
        run: PYTHON_GIL=0 python -m simplejson.tests._cibw_runner .

  build_wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: aarch64
          - os: ubuntu-latest
            arch: ppc64le
          - os: windows-latest
            arch: auto
          - os: macos-latest
            arch: "x86_64 universal2 arm64"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_TEST_COMMAND: >-
            python -m simplejson.tests._cibw_runner "{project}"
          CIBW_ENABLE: "cpython-freethreading"
          CIBW_ARCHS: ${{ matrix.arch }}
          # Skip PyPy wheels (covered by the pure-Python test job).
          # Skip Python 3.8 on Windows: cibuildwheel 3.4.1 ships a
          # virtualenv that cannot bootstrap Python 3.8 on Windows,
          # and 3.8 has been EOL since October 2024.
          CIBW_SKIP: "pp* cp38-win*"

      - name: Build Python 2.7 wheels
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        uses: pypa/cibuildwheel@v1.12.0
        env:
          CIBW_TEST_COMMAND: >-
            python -m simplejson.tests._cibw_runner "{project}"
          CIBW_BUILD: "cp27-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5.6.0
        name: Install Python
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Build sdist
        run: python setup.py sdist

      - name: Build wheel
        run: DISABLE_SPEEDUPS=1 python setup.py bdist_wheel

      - name: Test sdist
        run: |
          mkdir tmp
          cd tmp
          tar zxf ../dist/simplejson-*.tar.gz
          cd simplejson-*
          REQUIRE_SPEEDUPS=1 python setup.py build build_ext -i test

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        with:
          name: sdist
          path: |
            dist/*.tar.gz
            dist/*-none-any.whl

  # Aggregate gate jobs to match branch protection rule names
  gate_ubuntu:
    name: Build wheels on ubuntu-latest
    needs: [build_wheels, test_pure_python, test_free_threading]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All ubuntu-latest checks passed"

  gate_windows:
    name: Build wheels on windows-latest
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All windows-latest checks passed"

  gate_macos:
    name: Build wheels on macos-latest
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All macos-latest checks passed"

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/simplejson/
    permissions:
      id-token: write
    # upload to PyPI on every tag starting with 'v'
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    # if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1

  upload_pypi_test:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: "testpypi"
      url: https://test.pypi.org/p/simplejson/
    permissions:
      id-token: write
    # upload to test PyPI on every tag starting with 'test-v'
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/test-v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    # if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
