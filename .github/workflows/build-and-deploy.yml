name: Build and upload to PyPI

on: [push, pull_request, merge_group]
# Alternatively, to publish when a (published) GitHub Release is created, use the following:
# on:
#   push:
#   pull_request:
#   release:
#     types:
#       - published

jobs:
  test_pure_python:
    name: Tests without speedup on ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
        - 'ubuntu-latest'
        python:
          - 3.15-dev
          - 3.14
          - 3.13
          - pypy-3.11
          - graalpy-25.0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m simplejson.tests._cibw_runner .

  test_prerelease:
    name: Tests with C speedups on Python 3.15-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.15-dev'
      - name: Build extension
        run: |
          python -m pip install --upgrade pip setuptools wheel
          REQUIRE_SPEEDUPS=1 python setup.py build_ext -i
      - name: Verify C speedups loaded
        run: |
          python -c "
          import sys, simplejson, simplejson.encoder, simplejson.scanner
          from simplejson._speedups import make_encoder, make_scanner
          assert simplejson.encoder.c_make_encoder is make_encoder, 'c_make_encoder not wired'
          assert simplejson.scanner.c_make_scanner is make_scanner, 'c_make_scanner not wired'
          print('OK: C speedups loaded and wired in, Python', sys.version)
          "
      - name: Run tests
        run: python -m simplejson.tests._cibw_runner .

  test_free_threading:
    name: Tests with free-threading on Python 3.14t
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14t'
      - name: Verify Python is a free-threaded build
        run: |
          python -c "
          import sys, sysconfig
          gil_disabled = sysconfig.get_config_var('Py_GIL_DISABLED')
          assert gil_disabled == 1, (
              'Python is not a free-threaded build '
              '(Py_GIL_DISABLED={!r}); setup-python did not install 3.14t.'
              .format(gil_disabled))
          print('OK: Py_GIL_DISABLED=1, sys.version=' + sys.version)
          "
      - name: Build extension with free-threading support
        run: |
          python -m pip install --upgrade pip setuptools wheel
          REQUIRE_SPEEDUPS=1 python setup.py build_ext -i
      - name: Verify GIL-free import and C speedups loaded
        run: |
          PYTHON_GIL=0 python -W error::RuntimeWarning -c "
          import simplejson, simplejson.encoder, simplejson.scanner
          from simplejson._speedups import make_encoder, make_scanner
          assert simplejson.encoder.c_make_encoder is make_encoder, 'c_make_encoder not wired'
          assert simplejson.scanner.c_make_scanner is make_scanner, 'c_make_scanner not wired'
          print('OK: C speedups loaded and wired in')
          "
      - name: Run tests
        run: python -m simplejson.tests._cibw_runner .
      - name: Run tests with GIL disabled
        run: PYTHON_GIL=0 python -m simplejson.tests._cibw_runner .

  test_debug_build:
    name: Tests on Python 3.14 ${{ matrix.variant }} debug build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - "standard"
          - "free-threaded"
        include:
          - variant: "standard"
            uv_python: "cpython-3.14.4+debug"
          - variant: "free-threaded"
            uv_python: "cpython-3.14.4+freethreaded+debug"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: Install Python via python-build-standalone (${{ matrix.uv_python }})
        run: |
          uv python install ${{ matrix.uv_python }}
          uv venv --python ${{ matrix.uv_python }} .venv
          uv pip install --python .venv/bin/python setuptools wheel
      - name: Verify debug build
        run: |
          .venv/bin/python -c "
          import sys
          assert hasattr(sys, 'gettotalrefcount'), (
              'not a debug build (sys.gettotalrefcount missing)')
          print('OK:', sys.version)
          "
      - name: Verify free-threaded build
        if: matrix.variant == 'free-threaded'
        run: |
          .venv/bin/python -c "
          import sysconfig
          assert sysconfig.get_config_var('Py_GIL_DISABLED') == 1, (
              'expected free-threaded build (Py_GIL_DISABLED=1)')
          print('OK: Py_GIL_DISABLED=1')
          "
      - name: Build extension with strict warnings (-Werror)
        env:
          CFLAGS: "-Wall -Wextra -Wshadow -Wstrict-prototypes -Werror -Wno-unused-parameter -Wno-missing-field-initializers -Wno-cast-function-type"
        run: REQUIRE_SPEEDUPS=1 .venv/bin/python setup.py build_ext -i
      - name: Verify C speedups loaded
        run: |
          .venv/bin/python -c "
          import simplejson, simplejson.encoder, simplejson.scanner
          from simplejson._speedups import make_encoder, make_scanner
          assert simplejson.encoder.c_make_encoder is make_encoder, 'c_make_encoder not wired'
          assert simplejson.scanner.c_make_scanner is make_scanner, 'c_make_scanner not wired'
          print('OK: C speedups loaded and wired in')
          "
      - name: Run tests (TestRefcountLeaks auto-enabled on debug build)
        run: .venv/bin/python -m simplejson.tests._cibw_runner .
      - name: Run tests with GIL disabled
        if: matrix.variant == 'free-threaded'
        run: PYTHON_GIL=0 .venv/bin/python -m simplejson.tests._cibw_runner .

  test_tsan:
    name: TSan stress (CPython v3.14.0 free-threaded)
    runs-on: ubuntu-latest
    env:
      # Keep in sync with the name above. Pinned so the cache key is stable;
      # bump when moving to a newer CPython (cache is keyed on this + clang
      # version + script hash).
      CPYTHON_REF: v3.14.0
      TSAN_ROOT: /home/runner/.cache/py-tsan-ft
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang lld \
            libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libffi-dev liblzma-dev
      - name: Record clang version (for cache key)
        id: clang
        run: |
          version=$(clang --version | head -1 | awk '{print $NF}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Restore TSan CPython build
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.TSAN_ROOT }}
          key: tsan-cpython-${{ env.CPYTHON_REF }}-${{ runner.os }}-clang${{ steps.clang.outputs.version }}-${{ hashFiles('scripts/run_tsan_stress.sh') }}
      - name: Build TSan CPython (cache miss only, ~15 min)
        id: build
        if: steps.cache.outputs.cache-hit != 'true'
        run: ./scripts/run_tsan_stress.sh build
      - name: Save TSan CPython build
        # Save the built CPython whether the later stress test passes or
        # fails, so a regression doesn't force a 15-min rebuild next run.
        # Skip save on cache hit (nothing new) or if the build itself failed
        # (would cache a broken install).
        if: always() && steps.cache.outputs.cache-hit != 'true' && steps.build.outcome == 'success'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.TSAN_ROOT }}
          key: ${{ steps.cache.outputs.cache-primary-key }}
      - name: Install simplejson and run stress test
        run: ./scripts/run_tsan_stress.sh test
      - name: Upload TSan report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tsan-report
          path: tsan_report.txt

  build_wheels_py27:
    name: Build Python 2.7 wheels (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: windows-latest
            arch: AMD64
          - os: windows-latest
            arch: x86
    steps:
      - uses: actions/checkout@v6

      - name: Build Python 2.7 wheels
        uses: pypa/cibuildwheel@v1.12.0
        env:
          CIBW_TEST_COMMAND: >-
            python -m simplejson.tests._cibw_runner "{project}"
          CIBW_BUILD: "cp27-*"
          CIBW_SKIP: "pp*"
          CIBW_ARCHS: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        with:
          name: wheels-py27-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: aarch64
          - os: ubuntu-latest
            arch: ppc64le
          - os: windows-latest
            arch: auto
          - os: macos-latest
            arch: "x86_64 universal2 arm64"

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_TEST_COMMAND: >-
            python -m simplejson.tests._cibw_runner "{project}"
          CIBW_ARCHS: ${{ matrix.arch }}
          # PyPy is disabled by default in cibuildwheel v3.x, so no
          # CIBW_SKIP needed for it (and adding one makes v3.4 error
          # out with "Invalid skip selector: 'pp*'").

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_pyodide_wheel:
    name: Build Pyodide wheel (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          # Host Python for cibuildwheel; Pyodide targets are selected
          # by cibuildwheel independently (currently cp312 + cp313).
          python-version: '3.14'

      - name: Build Pyodide wheel with C speedups
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_PLATFORM: pyodide
          CIBW_TEST_COMMAND: >-
            python -m simplejson.tests._cibw_runner "{project}"

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        with:
          name: wheels-pyodide
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Build sdist
        run: python setup.py sdist

      - name: Build wheel
        # --universal produces a py2.py3-none-any wheel so Python 2.7
        # offline/air-gapped installs can use the pre-built wheel
        # instead of being forced to build the sdist under PEP 517
        # build isolation (which needs setuptools>=42 in the
        # wheelhouse). See issue #377.
        run: DISABLE_SPEEDUPS=1 python setup.py bdist_wheel --universal

      - name: Test sdist
        run: |
          mkdir tmp
          cd tmp
          tar zxf ../dist/simplejson-*.tar.gz
          cd simplejson-*
          REQUIRE_SPEEDUPS=1 python setup.py build build_ext -i test

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/')
        with:
          name: sdist
          path: |
            dist/*.tar.gz
            dist/*-none-any.whl

  test_pep517_build:
    name: Test PEP 517 build (pyproject.toml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        name: Install Python
        with:
          python-version: '3.14'

      - name: Install build frontend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel via PEP 517
        run: python -m build --outdir pep517_dist

      - name: Verify PEP 517 artifacts
        run: |
          ls -la pep517_dist/
          test -f pep517_dist/simplejson-*.tar.gz
          test -f pep517_dist/simplejson-*.whl

      - name: Install and smoke-test the PEP 517 wheel
        run: |
          python -m pip install pep517_dist/simplejson-*.whl
          cd /tmp
          python -c "
          import simplejson as json
          assert json.__version__, 'missing __version__'
          assert json.dumps([1, 2, 3]) == '[1, 2, 3]'
          print('PEP 517 wheel OK: simplejson', json.__version__)
          "

  # Aggregate gate jobs to match branch protection rule names
  gate_ubuntu:
    name: Build wheels on ubuntu-latest
    needs: [build_wheels, build_wheels_py27, build_pyodide_wheel, test_pure_python, test_prerelease, test_free_threading, test_debug_build, test_pep517_build, test_tsan]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All ubuntu-latest checks passed"

  gate_windows:
    name: Build wheels on windows-latest
    needs: [build_wheels, build_wheels_py27]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All windows-latest checks passed"

  gate_macos:
    name: Build wheels on macos-latest
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All macos-latest checks passed"

  upload_pypi:
    needs: [build_wheels, build_wheels_py27, build_pyodide_wheel, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/simplejson/
    permissions:
      id-token: write
    # upload to PyPI on every tag starting with 'v'
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    # if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      # PyPI rejects Pyodide/wasm wheels (unsupported platform tag). Drop them
      # from the upload set; they're still kept as workflow artifacts.
      - name: Remove Pyodide wheels before upload
        run: rm -f dist/*pyodide*.whl

      - uses: pypa/gh-action-pypi-publish@release/v1

  upload_pypi_test:
    needs: [build_wheels, build_wheels_py27, build_pyodide_wheel, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: "testpypi"
      url: https://test.pypi.org/p/simplejson/
    permissions:
      id-token: write
    # upload to test PyPI on every tag starting with 'test-v'
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags/test-v')
    # alternatively, to publish when a GitHub Release is created, use the following rule:
    # if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      # PyPI rejects Pyodide/wasm wheels (unsupported platform tag). Drop them
      # from the upload set; they're still kept as workflow artifacts.
      - name: Remove Pyodide wheels before upload
        run: rm -f dist/*pyodide*.whl

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
